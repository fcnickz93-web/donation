[build]
  base    = "."
  command = "pnpm install --no-frozen-lockfile && pnpm --filter @workspace/trashboy run build"
  publish = "artifacts/trashboy/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
